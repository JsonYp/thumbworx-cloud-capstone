name: Thumbworx Cloud CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: project-starter-main

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build --no-cache -t thumbworx-app .

      - name: Validate Docker Compose
        run: docker compose config

  laravel:
    name: Laravel Validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: project-starter-main

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Composer
        run: composer install --no-interaction --prefer-dist

      - name: Prepare Laravel
        run: |
          if [ -f .env.example ]; then
            cp .env.example .env
          else
            printf "APP_ENV=local\nAPP_KEY=\nAPP_DEBUG=true\nAPP_URL=http://localhost\n" > .env
          fi
          php artisan key:generate --force
          php artisan config:clear

      - name: Validate Laravel
        run: php artisan route:list

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: project-starter-main

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Node Packages
        run: npm ci

      - name: Build Frontend
        env:
          SKIP_WAYFINDER_GENERATION: '1'
        run: npm run build

  terraform:
    name: Terraform Validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Initialize
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate